<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>THE T-BLOOM · Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #fffaf5 0%, #ffeef4 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* This is the key: a two-column grid layout */
    .split-screen {
      max-width: 1400px;
      width: 100%;
      background: rgba(255, 251, 248, 0.94);
      backdrop-filter: blur(8px);
      border-radius: 72px;
      box-shadow: 0 40px 60px -24px rgba(255, 80, 120, 0.3);
      border: 1px solid rgba(255, 210, 225, 0.7);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1fr; /* TWO EQUAL HALVES */
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .split-screen:hover {
      transform: scale(1.01);
      box-shadow: 0 48px 70px -24px rgba(255, 100, 130, 0.35);
    }

    /* LEFT HALF: Title only - perfectly centered */
    .left-half {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      min-height: 550px;
    }

    .main-title {
      font-family: 'Great Vibes', cursive;
      font-size: 6rem;
      font-weight: 600;
      background: linear-gradient(125deg, #ff4fa3, #ff8eb5, #ffb3cc);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-align: center;
      letter-spacing: 4px;
      line-height: 1.2;
      animation: softPulse 3s infinite alternate;
    }

    @keyframes softPulse {
      0% { filter: drop-shadow(0 0 2px rgba(255, 105, 180, 0.15)); }
      100% { filter: drop-shadow(0 0 14px rgba(255, 105, 180, 0.3)); }
    }

    /* RIGHT HALF: Picture only - bigger, centered, directly opposite */
    .right-half {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      background: linear-gradient(145deg, #fffaf5, #fff0f7);
      min-height: 550px;
    }

    .hero-image {
      width: 100%;
      max-width: 550px;  /* BIGGER */
      height: auto;
      border-radius: 48px;
      box-shadow: 0 28px 40px -16px rgba(0, 0, 0, 0.25);
      transition: transform 0.35s ease, box-shadow 0.3s;
      display: block;
      object-fit: cover;
    }

    .hero-image:hover {
      transform: scale(1.02);
      box-shadow: 0 35px 50px -18px rgba(255, 80, 120, 0.35);
    }

    /* simple click hint at the bottom - spans both columns */
    .click-hint {
      grid-column: span 2;
      text-align: center;
      padding: 1rem 0 1.5rem 0;
      font-size: 0.85rem;
      color: #c47a96;
      opacity: 0.7;
      letter-spacing: 1.5px;
      border-top: 1px solid rgba(255, 200, 210, 0.5);
      margin-top: 0;
    }

    /* Responsive: on smaller screens, it becomes a single column */
    @media (max-width: 850px) {
      .split-screen {
        grid-template-columns: 1fr;
      }
      .click-hint {
        grid-column: span 1;
      }
      .left-half, .right-half {
        min-height: 350px;
        padding: 2rem;
      }
      .main-title {
        font-size: 4rem;
      }
      .hero-image {
        max-width: 350px;
      }
    }

    @media (max-width: 550px) {
      .main-title {
        font-size: 2.8rem;
      }
      .hero-image {
        max-width: 250px;
      }
      .left-half, .right-half {
        min-height: 280px;
        padding: 1.5rem;
      }
      body {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>

<!-- TWO-COLUMN GRID: Title on the left, Picture on the right, directly opposite -->
<div class="split-screen" id="mainGateway">
  <!-- LEFT HALF: ONLY THE TITLE (no extra text, no floating) -->
  <div class="left-half">
    <h1 class="main-title">THE T-BLOOM</h1>
  </div>
  
  <!-- RIGHT HALF: ONLY THE PICTURE (bigger, centered, directly opposite) -->
  <div class="right-half">
    <img src="images/picture3.png" class="hero-image" alt="Bloom" onerror="this.src='https://placehold.co/550x550/fce4ec/ff77aa?text=🌸'; this.onerror=null;">
  </div>
  
  <div class="click-hint">🌸 click anywhere to enter the collection 🌸</div>
</div>

<script>
  // Click anywhere on the split-screen to go to the next page
  const gateway = document.getElementById('mainGateway');
  if (gateway) {
    gateway.addEventListener('click', () => {
      window.location.href = 'Different, but Fashion.html';
    });
  }
</script>
</body>
</html>
