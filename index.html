<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>THE T-BLOOM · Entrance</title>
  <!-- Google Fonts: Great Vibes for signature, Poppins for clean modern style -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #fff7f0 0%, #ffeef4 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* floating dreamy background effects (gentle, non-intrusive) */
    body::before {
      content: "🌸💗🎀✨";
      font-size: 280px;
      position: absolute;
      bottom: -60px;
      left: -70px;
      opacity: 0.06;
      pointer-events: none;
      white-space: nowrap;
      transform: rotate(-6deg);
    }

    body::after {
      content: "🌟💕🌸🎀";
      font-size: 260px;
      position: absolute;
      top: -50px;
      right: -60px;
      opacity: 0.05;
      pointer-events: none;
      transform: rotate(5deg);
    }

    /* main minimal cover card — ONLY title + picture3.png */
    .cover-card {
      max-width: 850px;
      width: 100%;
      background: rgba(255, 251, 248, 0.92);
      backdrop-filter: blur(12px);
      border-radius: 88px;
      padding: 3rem 2rem 3rem 2rem;
      text-align: center;
      box-shadow: 0 40px 60px -20px rgba(255, 80, 120, 0.3);
      border: 1px solid rgba(255, 210, 220, 0.7);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      z-index: 10;
      animation: gentleGlow 0.9s ease-out;
    }

    .cover-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 48px 70px -22px rgba(255, 100, 130, 0.35);
    }

    @keyframes gentleGlow {
      0% {
        opacity: 0;
        transform: scale(0.97);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* title wrapper - contains only title and picture3.png in corner */
    .title-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 0.5rem;
    }

    /* main title: THE T-BLOOM (with space after T) */
    .main-title {
      font-family: 'Great Vibes', cursive;
      font-size: 5.6rem;
      font-weight: 600;
      background: linear-gradient(125deg, #ff4fa3, #ff8eb5, #ffb3cc);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: 3px;
      margin: 0;
      animation: softPulse 2.5s infinite alternate;
    }

    @keyframes softPulse {
      0% { text-shadow: 0 0 0px rgba(255, 79, 163, 0.2); }
      100% { text-shadow: 0 0 12px rgba(255, 79, 163, 0.3); }
    }

    /* ONLY picture3.png in the corner of the title — as requested */
    .corner-img {
      position: absolute;
      top: -45px;
      right: -85px;
      width: 105px;
      height: auto;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.12));
      transition: transform 0.3s ease, filter 0.2s;
      border-radius: 32px;
      cursor: pointer;
    }

    .corner-img:hover {
      transform: scale(1.08) rotate(3deg);
      filter: drop-shadow(0 14px 22px rgba(255, 80, 140, 0.3));
    }

    /* responsive adjustments for smaller screens */
    @media (max-width: 680px) {
      .main-title { font-size: 3.8rem; }
      .corner-img {
        width: 75px;
        top: -28px;
        right: -55px;
      }
      .cover-card { padding: 2rem 1.2rem; }
    }

    @media (max-width: 480px) {
      .main-title { font-size: 2.7rem; }
      .corner-img {
        width: 60px;
        top: -20px;
        right: -40px;
      }
    }

    /* minimal entrance hint + button to explore other pages */
    .enter-hint {
      margin-top: 3rem;
      font-size: 0.95rem;
      color: #bc7a94;
      font-weight: 500;
      letter-spacing: 1px;
    }

    .btn-enter {
      display: inline-block;
      background: linear-gradient(95deg, #ff9f4a, #ffb86b);
      padding: 12px 38px;
      border-radius: 60px;
      text-decoration: none;
      color: #3e2a2a;
      font-weight: 700;
      font-size: 1rem;
      margin-top: 1.2rem;
      box-shadow: 0 8px 18px rgba(255, 140, 70, 0.3);
      transition: all 0.25s ease;
      border: none;
      cursor: pointer;
    }

    .btn-enter:hover {
      transform: translateY(-4px);
      background: linear-gradient(95deg, #ffad5e, #ffc87a);
      box-shadow: 0 15px 25px -5px rgba(255, 120, 60, 0.5);
    }

    /* subtle footnote with editor name (minimal) */
    .credit-note {
      margin-top: 2.2rem;
      font-size: 0.7rem;
      opacity: 0.55;
      color: #b47b92;
    }

    /* floating sparkle effect for click interaction */
    .sparkle-pop {
      position: fixed;
      pointer-events: none;
      font-size: 1.3rem;
      animation: floatUpFade 0.7s forwards;
      z-index: 9999;
    }

    @keyframes floatUpFade {
      0% {
        opacity: 1;
        transform: scale(0.5) translateY(0);
      }
      100% {
        opacity: 0;
        transform: scale(1.1) translateY(-35px);
      }
    }
  </style>
</head>
<body>

<div class="cover-card">
  <!-- TITLE SECTION: ONLY THE T-BLOOM title + picture3.png in the corner -->
  <div class="title-wrapper">
    <h1 class="main-title">THE T-BLOOM</h1>
    <!-- picture3.png from images folder placed ONLY in the corner of the title (exactly as requested) -->
    <img src="images/picture3.png" class="corner-img" alt="bloom accent" onerror="this.src='https://placehold.co/100x100/ffe0eb/ff77aa?text=🌸'; this.onerror=null;">
  </div>

  <!-- minimal hint and button to navigate to the other pages (different-fashion, two-worlds, closing) -->
  <div class="enter-hint">
    ✧ a bloom of style awaits ✧
  </div>
  <a href="different-fashion.html" class="btn-enter">
    enter the collection →
  </a>

  <div class="credit-note">
    — Editor-in-Chief, Tianah Gaila
  </div>
</div>

<script>
  (function() {
    // interactive sparkle effect when clicking on the cover card (playful but elegant)
    const card = document.querySelector('.cover-card');
    if (card) {
      card.addEventListener('click', function(e) {
        // avoid double effect if clicking on button or anchor
        if (e.target.closest('.btn-enter')) return;
        
        const sparkle = document.createElement('div');
        const icons = ['🌸', '💗', '🎀', '✨', '⭐', '💕'];
        const randomIcon = icons[Math.floor(Math.random() * icons.length)];
        sparkle.innerHTML = randomIcon;
        sparkle.classList.add('sparkle-pop');
        const x = e.clientX;
        const y = e.clientY;
        sparkle.style.left = (x - 12) + 'px';
        sparkle.style.top = (y - 12) + 'px';
        document.body.appendChild(sparkle);
        setTimeout(() => {
          sparkle.remove();
        }, 700);
      });
    }

    // corner image interaction: mini message when clicked (just for charm)
    const cornerPic = document.querySelector('.corner-img');
    if (cornerPic) {
      cornerPic.addEventListener('click', (e) => {
        e.stopPropagation();
        const msg = document.createElement('div');
        msg.innerText = '🌸 THE T-BLOOM · let fashion bloom 🌸';
        msg.style.position = 'fixed';
        msg.style.bottom = '25px';
        msg.style.left = '50%';
        msg.style.transform = 'translateX(-50%)';
        msg.style.backgroundColor = '#fff0f5';
        msg.style.color = '#cc6f8c';
        msg.style.padding = '8px 24px';
        msg.style.borderRadius = '50px';
        msg.style.fontWeight = '600';
        msg.style.fontSize = '0.8rem';
        msg.style.zIndex = '1000';
        msg.style.boxShadow = '0 6px 16px rgba(0,0,0,0.1)';
        msg.style.backdropFilter = 'blur(8px)';
        msg.style.border = '1px solid #ffc0d0';
        msg.style.fontFamily = 'Poppins, sans-serif';
        document.body.appendChild(msg);
        setTimeout(() => {
          msg.style.opacity = '0';
          msg.style.transition = 'opacity 0.3s';
          setTimeout(() => msg.remove(), 400);
        }, 1400);
      });
    }

    // no other images or text content — pure minimal page as requested.
    // all other content (description, y2k nostalgia, quotes, culture, etc.) will be on separate pages.
  })();
</script>
</body>
</html>
