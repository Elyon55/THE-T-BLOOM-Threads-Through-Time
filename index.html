<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>THE-T BLOOM</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  scroll-behavior: smooth;
}

/* HEADER (TITLE + IMAGE) */
.header {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 20px;
  background: #ffc0cb;
}

.header h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 60px;
  margin: 0;
  color: #ff4fa3;
}

.title-img {
  width: 80px;
}

/* PAGE */
.page {
  height: 100vh;
  width: 100%;
  background-size: cover;
  background-position: center;
}

/* COVER TEXT */
.cover-text {
  padding: 40px;
  color: #ff4fa3;
}

.btn {
  display: inline-block;
  background: gold;
  padding: 10px 20px;
  border-radius: 20px;
  text-decoration: none;
  color: black;
  margin-top: 10px;
}

/* FINAL PAGE */
.final {
  height: 100vh;
  background: #f7dbe5;
  position: relative;
  text-align: center;
  padding-top: 100px;
  color: #ff4fa3;
}

/* STICKER BACKGROUND */
.bg-sticker {
  position: absolute;
  width: 150px;
  opacity: 0.3;
}

.bg1 { top: 20px; left: 20px; }
.bg2 { bottom: 20px; right: 20px; }

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h1>THE-T BLOOM</h1>
  <img src="images/picture3.png" class="title-img">
</div>

<!-- PAGE 1 (COVER CONTENT) -->
<section class="page">
  <div class="cover-text">
    <p>Where vintage meets now 💗</p>
    <a href="#p2" class="btn">Enter</a>
  </div>
</section>

<!-- PAGE 2 -->
<section id="p2" class="page" style="background-image:url('images/picture4.png')">
</section>

<!-- PAGE 3 -->
<section class="page" style="background-image:url('images/picture3.png')">
</section>

<!-- PAGE 4 -->
<section class="page" style="background-image:url('images/picture6.png')">
</section>

<!-- FINAL PAGE -->
<section class="final">

  <!-- STICKERS -->
  <img src="images/picture7.png" class="bg-sticker bg1">
  <img src="images/picture8.png" class="bg-sticker bg2">

  <h2 style="font-family:'Great Vibes'; font-size:50px;">THE-T BLOOM 💗</h2>

  <p>🌍 Fashion reflects culture and diversity</p>
  <p>✨ Creativity keeps it evolving</p>
  <p>🌸 Every style tells a story</p>

  <h3>Komeza ube wowe 💕</h3>

</section>

</body>
</html>
