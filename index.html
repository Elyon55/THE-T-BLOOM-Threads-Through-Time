<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>THE T-BLOOM · Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #fffaf5 0%, #ffeef4 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
    }

    /* ========== VISIBLE DECORATIONS: floating emojis ========== */
    .floating-emoji {
      position: absolute;
      pointer-events: none;
      z-index: 5;
      font-size: 2rem;
      filter: drop-shadow(0 4px 8px rgba(255, 100, 120, 0.3));
      animation: floatEmoji 6s infinite ease-in-out;
    }

    @keyframes floatEmoji {
      0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.7; }
      50% { transform: translateY(-20px) rotate(8deg); opacity: 1; }
    }

    @keyframes twinkleEmoji {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    @keyframes spinEmoji {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .emoji-1 { top: 5%; left: 3%; animation-duration: 5s; }
    .emoji-2 { top: 12%; right: 5%; animation-duration: 7s; animation-delay: 0.5s; }
    .emoji-3 { bottom: 15%; left: 4%; animation-duration: 6s; animation-delay: 1s; }
    .emoji-4 { bottom: 20%; right: 6%; animation-duration: 5.5s; animation-delay: 0.3s; }
    .emoji-5 { top: 30%; left: 2%; animation-duration: 8s; }
    .emoji-6 { top: 55%; right: 3%; animation-duration: 4.5s; }
    .emoji-7 { bottom: 40%; left: 7%; animation-duration: 6.5s; }
    .emoji-8 { top: 70%; right: 8%; animation-duration: 5.8s; }
    .emoji-9 { top: 20%; left: 10%; animation: twinkleEmoji 3s infinite; font-size: 1.5rem; }
    .emoji-10 { bottom: 30%; right: 10%; animation: spinEmoji 10s infinite linear; font-size: 1.6rem; }
    .emoji-11 { top: 45%; left: 88%; animation: floatEmoji 4.5s infinite; font-size: 1.7rem; }
    .emoji-12 { bottom: 10%; left: 15%; animation: twinkleEmoji 3.5s infinite; font-size: 1.5rem; }

    body::before {
      content: "🌸 💗 🎀 ✨ 💕 🌸 ✨ 🎀 💗 🌸";
      font-size: 200px;
      position: absolute;
      bottom: -50px;
      left: -80px;
      opacity: 0.06;
      pointer-events: none;
      white-space: nowrap;
      z-index: 0;
    }

    body::after {
      content: "✨ 💖 🌟 🎀 💕 ✨ 💗 🌸 ✨ 💖";
      font-size: 190px;
      position: absolute;
      top: -40px;
      right: -70px;
      opacity: 0.05;
      pointer-events: none;
      z-index: 0;
    }

    /* MAIN SPLIT CARD */
    .hero-card {
      max-width: 1400px;
      width: 100%;
      background: rgba(255, 251, 248, 0.95);
      backdrop-filter: blur(12px);
      border-radius: 80px;
      box-shadow: 0 40px 60px -24px rgba(255, 80, 120, 0.35);
      border: 2px solid rgba(255, 180, 150, 0.5);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1fr;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
      z-index: 10;
    }

    .hero-card:hover {
      transform: scale(1.01);
      box-shadow: 0 50px 75px -28px rgba(255, 100, 130, 0.45);
      border-color: rgba(255, 200, 160, 0.8);
    }

    /* LEFT HALF */
    .left-half {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      min-height: 550px;
      background: linear-gradient(145deg, rgba(255, 250, 245, 0.95), rgba(255, 245, 240, 0.95));
      position: relative;
    }

    .title-emoji {
      position: absolute;
      font-size: 2rem;
      opacity: 0.65;
      filter: drop-shadow(0 2px 4px rgba(255, 100, 100, 0.3));
    }
    .title-emoji-1 { top: 25px; left: 25px; animation: floatEmoji 4s infinite; }
    .title-emoji-2 { top: 25px; right: 25px; animation: floatEmoji 5s infinite 0.5s; }
    .title-emoji-3 { bottom: 25px; left: 25px; animation: floatEmoji 4.5s infinite 1s; }
    .title-emoji-4 { bottom: 25px; right: 25px; animation: spinEmoji 8s infinite linear; }
    .title-emoji-5 { top: 50%; left: 15px; animation: twinkleEmoji 2.8s infinite; font-size: 1.5rem; }
    .title-emoji-6 { top: 45%; right: 15px; animation: floatEmoji 3.5s infinite; font-size: 1.5rem; }

    .main-title {
      font-family: 'Great Vibes', cursive;
      font-size: 6rem;
      font-weight: 600;
      background: linear-gradient(125deg, #ff4fa3, #ff8eb5, #e8a87c, #ffb347);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-align: center;
      letter-spacing: 4px;
      line-height: 1.2;
      animation: softPulse 3s infinite alternate;
      margin-bottom: 0.8rem;
    }

    @keyframes softPulse {
      0%, 100% { filter: drop-shadow(0 0 2px rgba(255, 105, 180, 0.3)); }
      50% { filter: drop-shadow(0 0 20px rgba(255, 160, 120, 0.5)); }
    }

    .title-decoration {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-top: 0.5rem;
      font-size: 1.8rem;
    }

    .title-decoration span {
      animation: floatEmoji 3s infinite;
      display: inline-block;
    }

    .title-decoration span:nth-child(2) { animation-delay: 0.5s; }
    .title-decoration span:nth-child(3) { animation-delay: 1s; }
    .title-decoration span:nth-child(4) { animation-delay: 0.3s; }
    .title-decoration span:nth-child(5) { animation-delay: 0.7s; }

    /* RIGHT HALF */
    .right-half {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      background: linear-gradient(145deg, #fffaf5, #fff0f7);
      min-height: 550px;
      position: relative;
    }

    .pic-emoji {
      position: absolute;
      font-size: 2.2rem;
      opacity: 0.75;
      filter: drop-shadow(0 2px 8px rgba(255, 120, 100, 0.35));
    }
    .pic-top { top: 25px; left: 50%; transform: translateX(-50%); animation: floatEmoji 3.5s infinite; }
    .pic-bottom { bottom: 25px; left: 50%; transform: translateX(-50%); animation: floatEmoji 4s infinite 0.8s; }
    .pic-left { top: 50%; left: 20px; transform: translateY(-50%); animation: twinkleEmoji 2.8s infinite; }
    .pic-right { top: 50%; right: 20px; transform: translateY(-50%); animation: twinkleEmoji 3.2s infinite 0.5s; }
    .pic-corner-tl { top: 15px; left: 15px; animation: spinEmoji 10s infinite linear; font-size: 1.7rem; }
    .pic-corner-br { bottom: 15px; right: 15px; animation: spinEmoji 12s infinite reverse; font-size: 1.7rem; }

    .hero-image {
      width: 100%;
      max-width: 520px;
      height: auto;
      border-radius: 48px;
      box-shadow: 0 28px 40px -16px rgba(0, 0, 0, 0.25), 0 0 0 6px rgba(255, 200, 160, 0.35);
      transition: transform 0.35s ease, box-shadow 0.3s;
      display: block;
      object-fit: cover;
      position: relative;
      z-index: 2;
    }

    .hero-image:hover {
      transform: scale(1.02);
      box-shadow: 0 35px 50px -18px rgba(255, 120, 80, 0.4), 0 0 0 10px rgba(255, 200, 160, 0.45);
    }

    .click-hint {
      grid-column: span 2;
      text-align: center;
      padding: 1.2rem 0 1.5rem 0;
      font-size: 0.9rem;
      color: #c47a96;
      opacity: 0.8;
      letter-spacing: 1.5px;
      border-top: 2px dashed rgba(255, 180, 150, 0.6);
      background: rgba(255, 250, 245, 0.9);
      font-weight: 500;
    }

    .click-hint span {
      display: inline-block;
      animation: floatEmoji 2s infinite;
      margin: 0 5px;
    }

    @media (max-width: 950px) {
      .hero-card {
        grid-template-columns: 1fr;
      }
      .click-hint {
        grid-column: span 1;
      }
      .left-half, .right-half {
        min-height: auto;
        padding: 2rem;
      }
      .main-title {
        font-size: 4rem;
      }
      .hero-image {
        max-width: 380px;
      }
    }

    @media (max-width: 600px) {
      body { padding: 1rem; }
      .main-title { font-size: 2.8rem; }
      .hero-image { max-width: 280px; }
      .left-half, .right-half { padding: 1.5rem; }
      .title-decoration { font-size: 1.2rem; gap: 8px; }
      .floating-emoji { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<!-- VISIBLE DECORATIONS -->
<div class="floating-emoji emoji-1">🌸</div>
<div class="floating-emoji emoji-2">💗</div>
<div class="floating-emoji emoji-3">🎀</div>
<div class="floating-emoji emoji-4">✨</div>
<div class="floating-emoji emoji-5">💕</div>
<div class="floating-emoji emoji-6">🌟</div>
<div class="floating-emoji emoji-7">🌸</div>
<div class="floating-emoji emoji-8">💖</div>
<div class="floating-emoji emoji-9">⭐</div>
<div class="floating-emoji emoji-10">🎀</div>
<div class="floating-emoji emoji-11">💗</div>
<div class="floating-emoji emoji-12">✨</div>

<!-- ENTIRE CARD IS CLICKABLE - takes you to welcome-bloom.html -->
<div class="hero-card" onclick="window.location.href='welcome-bloom.html';">
  <div class="left-half">
    <div class="title-emoji title-emoji-1">🌸</div>
    <div class="title-emoji title-emoji-2">💗</div>
    <div class="title-emoji title-emoji-3">🎀</div>
    <div class="title-emoji title-emoji-4">✨</div>
    <div class="title-emoji title-emoji-5">💕</div>
    <div class="title-emoji title-emoji-6">🌟</div>
    
    <h1 class="main-title">THE T-BLOOM</h1>
    
    <div class="title-decoration">
      <span>🌸</span>
      <span>💗</span>
      <span>🎀</span>
      <span>✨</span>
      <span>💕</span>
    </div>
  </div>
  
  <div class="right-half">
    <div class="pic-emoji pic-top">🌸</div>
    <div class="pic-emoji pic-bottom">💗</div>
    <div class="pic-emoji pic-left">🎀</div>
    <div class="pic-emoji pic-right">✨</div>
    <div class="pic-emoji pic-corner-tl">💕</div>
    <div class="pic-emoji pic-corner-br">🌟</div>
    
    <img src="images/picture3.png" class="hero-image" alt="Bloom" onerror="this.src='https://placehold.co/550x550/fce4ec/ff77aa?text=🌸💗'; this.onerror=null;">
  </div>
  
  <div class="click-hint">
    <span>🌸</span> click anywhere to explore the collection <span>✨</span>
  </div>
</div>

</body>
</html>
