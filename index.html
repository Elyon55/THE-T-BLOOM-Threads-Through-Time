<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>THE-T BLOOM</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  padding: 0;
  scroll-snap-type: y mandatory;
  overflow-y: scroll;
  font-family: 'Poppins', sans-serif;
}

/* EACH PAGE */
.page {
  height: 100vh;
  width: 100%;
  background-size: cover;
  background-position: center;
  scroll-snap-align: start;
  position: relative;
}

/* COVER TEXT */
.cover-text {
  position: absolute;
  top: 30%;
  left: 8%;
  color: #ffb6d9;
}

.cover-text h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 90px;
  margin: 0;
}

.cover-text p {
  font-size: 20px;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 20px;
  background: gold;
  padding: 12px 25px;
  border-radius: 30px;
  text-decoration: none;
  color: black;
}

/* FINAL PAGE */
.final {
  height: 100vh;
  background: #f7dbe5;
  position: relative;
  text-align: center;
  padding-top: 100px;
  color: #ff4fa3;
}

/* STICKER BACKGROUND */
.bg-sticker {
  position: absolute;
  width: 180px;
  opacity: 0.25;
  animation: float 6s infinite alternate;
}

.bg1 { top: 20px; left: 20px; }
.bg2 { bottom: 20px; right: 20px; }
.bg3 { top: 50%; left: 60%; }

@keyframes float {
  from { transform: translateY(0); }
  to { transform: translateY(20px); }
}

/* SPARKLES */
.sparkle {
  position: fixed;
  width: 8px;
  height: 8px;
  background: radial-gradient(circle, gold 0%, hotpink 70%, transparent 100%);
  border-radius: 50%;
  pointer-events: none;
  animation: sparkleFade 0.8s linear forwards;
}

@keyframes sparkleFade {
  from { opacity: 1; transform: scale(1); }
  to { opacity: 0; transform: scale(0.3) translateY(-10px); }
}
</style>
</head>

<body>

<!-- PAGE 1 (COVER) -->
<section class="page" style="background-image:url('images/picture3.png')">
  <div class="cover-text">
    <h1>THE-T BLOOM</h1>
    <p>Where vintage meets now 💗</p>
    <a href="#p2" class="btn">Enter ✨</a>
  </div>
</section>

<!-- PAGE 2 -->
<section id="p2" class="page" style="background-image:url('images/picture4.png')">
</section>

<!-- PAGE 3 -->
<section class="page" style="background-image:url('images/picture3.png')">
</section>

<!-- PAGE 4 -->
<section class="page" style="background-image:url('images/picture6.png')">
</section>

<!-- FINAL PAGE -->
<section class="final">

  <!-- STICKERS -->
  <img src="images/picture7.png" class="bg-sticker bg1">
  <img src="images/picture8.png" class="bg-sticker bg2">
  <img src="images/picture7.png" class="bg-sticker bg3">

  <h1 style="font-family:'Great Vibes'; font-size:60px;">THE-T BLOOM 💗</h1>

  <p>🌍 Fashion reflects culture, diversity, and change</p>
  <p>✨ Creativity keeps it evolving</p>
  <p>🌸 Every style tells a story</p>

  <h2>Komeza ube wowe 💕</h2>

</section>

<!-- SPARKLE SCRIPT -->
<script>
document.addEventListener("mousemove", function(e) {
  const s = document.createElement("div");
  s.className = "sparkle";
  s.style.left = e.clientX + "px";
  s.style.top = e.clientY + "px";
  document.body.appendChild(s);

  setTimeout(() => s.remove(), 800);
});
</script>

</body>
</html>
