<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>THE T-BLOOM · Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #fffaf5 0%, #ffeef4 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
    }

    /* soft decorative background accents */
    body::before {
      content: "🌸💗🎀";
      font-size: 320px;
      position: absolute;
      bottom: -80px;
      left: -80px;
      opacity: 0.05;
      pointer-events: none;
      white-space: nowrap;
      z-index: 0;
    }

    body::after {
      content: "✨💕🌸";
      font-size: 280px;
      position: absolute;
      top: -60px;
      right: -70px;
      opacity: 0.04;
      pointer-events: none;
      z-index: 0;
    }

    /* main card - full width split layout */
    .hero-card {
      max-width: 1400px;
      width: 100%;
      background: rgba(255, 251, 248, 0.94);
      backdrop-filter: blur(8px);
      border-radius: 72px;
      padding: 3rem 3.5rem;
      box-shadow: 0 40px 60px -24px rgba(255, 80, 120, 0.3);
      border: 1px solid rgba(255, 210, 225, 0.7);
      z-index: 2;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }

    .hero-card:hover {
      transform: scale(1.01);
      box-shadow: 0 48px 70px -24px rgba(255, 100, 130, 0.35);
    }

    /* SPLIT LAYOUT: title on LEFT half, picture on RIGHT half - directly opposite */
    .split-layout {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4rem;
      flex-wrap: wrap;
    }

    /* LEFT HALF: ONLY THE TITLE (centered vertically in its half) */
    .title-side {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 400px;
    }

    .main-title {
      font-family: 'Great Vibes', cursive;
      font-size: 6.5rem;
      font-weight: 600;
      background: linear-gradient(125deg, #ff4fa3, #ff8eb5, #ffb3cc, #ff8eb5);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: 4px;
      line-height: 1.2;
      text-shadow: none;
      animation: softPulse 3s infinite alternate;
      text-align: center;
    }

    @keyframes softPulse {
      0% { filter: drop-shadow(0 0 2px rgba(255, 105, 180, 0.15)); }
      100% { filter: drop-shadow(0 0 14px rgba(255, 105, 180, 0.3)); }
    }

    /* RIGHT HALF: picture3.png - BIGGER, directly opposite the title, NOT floating */
    .picture-side {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 400px;
    }

    .hero-image {
      width: 100%;
      max-width: 550px;
      height: auto;
      border-radius: 48px;
      box-shadow: 0 28px 40px -16px rgba(0, 0, 0, 0.25);
      transition: transform 0.35s ease, box-shadow 0.3s;
      display: block;
      object-fit: cover;
      background: #fce4ec;
    }

    .hero-image:hover {
      transform: scale(1.02);
      box-shadow: 0 35px 50px -18px rgba(255, 80, 120, 0.35);
    }

    /* subtle click hint */
    .click-hint {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #c47a96;
      opacity: 0.6;
      letter-spacing: 1.5px;
      font-weight: 400;
    }

    /* RESPONSIVE: stacks on mobile but still title top, image below */
    @media (max-width: 950px) {
      .split-layout {
        flex-direction: column;
        gap: 2rem;
      }
      .main-title {
        font-size: 4.5rem;
      }
      .hero-image {
        max-width: 400px;
      }
      .hero-card {
        padding: 2rem 2rem;
      }
      .title-side, .picture-side {
        min-height: auto;
      }
    }

    @media (max-width: 600px) {
      .main-title {
        font-size: 3rem;
        letter-spacing: 2px;
      }
      .hero-image {
        max-width: 280px;
      }
      .hero-card {
        padding: 1.8rem;
      }
      .click-hint {
        font-size: 0.7rem;
        margin-top: 1.2rem;
      }
    }
  </style>
</head>
<body>

<div class="hero-card" id="mainGateway">
  <div class="split-layout">
    <!-- LEFT HALF: ONLY THE TITLE (THE T-BLOOM) - centered in its half -->
    <div class="title-side">
      <h1 class="main-title">THE T-BLOOM</h1>
    </div>
    
    <!-- RIGHT HALF: picture3.png - BIGGER and directly opposite the title, NOT floating, NOT in corner -->
    <div class="picture-side">
      <img src="images/picture3.png" class="hero-image" alt="bloom visual" onerror="this.src='https://placehold.co/600x600/fce4ec/ff77aa?text=🌸'; this.onerror=null;">
    </div>
  </div>
  <div class="click-hint">🌸 click anywhere to explore the collection 🌸</div>
</div>

<script>
  // FIRST PAGE: title on LEFT half, picture on RIGHT half - directly opposite, larger
  // All other content is on separate pages.
  // Click anywhere on the card to navigate to the "Different, but Fashion.html" page.
  (function() {
    const gateway = document.getElementById('mainGateway');
    if (gateway) {
      gateway.addEventListener('click', function(e) {
        this.style.transition = 'transform 0.12s ease';
        this.style.transform = 'scale(0.98)';
        setTimeout(() => {
          window.location.href = 'Different, but Fashion.html';
        }, 100);
      });
    }
  })();
</script>
</body>
</html>
