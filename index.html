<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>THE-T BLOOM</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  scroll-behavior: smooth;
  background: #f7dbe5;
}

/* FULL PAGE SECTIONS */
.page {
  width: 100%;
  height: 100vh;
  position: relative;
  background-size: cover;
  background-position: center;
}

/* DARK OVERLAY (only where needed) */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.2);
}

/* COVER TEXT */
.cover-text {
  position: absolute;
  top: 30%;
  left: 10%;
  color: #ffb6d9;
}

.cover-text h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 90px;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 20px;
  background: gold;
  padding: 12px 25px;
  border-radius: 30px;
  text-decoration: none;
  color: black;
  transition: 0.3s;
}

.btn:hover {
  background: hotpink;
  color: white;
}

/* FINAL PAGE */
.final {
  height: 100vh;
  background: #f7dbe5;
  position: relative;
  text-align: center;
  padding-top: 100px;
  color: #ff4fa3;
}

/* STICKER BACKGROUND */
.bg-sticker {
  position: absolute;
  width: 200px;
  opacity: 0.25;
  animation: float 6s infinite alternate;
}

.bg1 { top: 20px; left: 20px; }
.bg2 { bottom: 20px; right: 20px; }
.bg3 { top: 50%; left: 60%; }

@keyframes float {
  from { transform: translateY(0); }
  to { transform: translateY(20px); }
}

.final h2 {
  font-family: 'Great Vibes', cursive;
  font-size: 50px;
}
<//* ✨ SPARKLE */
.sparkle {
  position: fixed;
  width: 8px;
  height: 8px;
  background: radial-gradient(circle, gold 0%, hotpink 60%, transparent 100%);
  border-radius: 50%;
  pointer-events: none;
  animation: sparkleFade 0.8s linear forwards;
  z-index: 9999;
}

@keyframes sparkleFade {
  from {
    transform: scale(1) translateY(0);
    opacity: 1;
  }
  to {
    transform: scale(0.3) translateY(-15px);
    opacity: 0;
  }
}>
</head>
<script>
document.addEventListener("mousemove", function(e) {
  const sparkle = document.createElement("div");
  sparkle.className = "sparkle";

  sparkle.style.left = e.clientX + "px";
  sparkle.style.top = e.clientY + "px";

  document.body.appendChild(sparkle);

  setTimeout(() => {
    sparkle.remove();
  }, 800);
});
</script>
<body>

<!-- PAGE 1: COVER -->
<section class="page" style="background-image:url('images/picture3.png')">
  <div class="overlay"></div>

  <div class="cover-text">
    <h1>THE-T BLOOM</h1>
    <p>Where vintage meets now 💗</p>

    <a href="#page2" class="btn">Enter ✨</a>
  </div>
</section>

<!-- PAGE 2 -->
<section id="page2" class="page" style="background-image:url('images/picture4.png')">
</section>

<!-- PAGE 3 -->
<section class="page" style="background-image:url('images/picture3.png')">
</section>

<!-- PAGE 4 -->
<section class="page" style="background-image:url('images/picture6.png')">
</section>

<!-- FINAL PAGE -->
<section class="final">

  <!-- STICKER BACKGROUND -->
  <img src="images/picture7.png" class="bg-sticker bg1">
  <img src="images/picture8.png" class="bg-sticker bg2">
  <img src="images/picture7.png" class="bg-sticker bg3">

  <h2>THE-T BLOOM 💗</h2>

  <p>🌍 Fashion reflects culture, diversity, and change</p>
  <p>✨ It continues to evolve through creativity</p>
  <p>🌸 Every style tells a story</p>

  <h3>Komeza ube wowe 💕</h3>

  <p>Thank you for visiting — Editor-in-Chief, Tianah Gaila ✨</p>

</section>

</body>
</html>
