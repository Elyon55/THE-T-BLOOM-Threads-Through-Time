<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>THE T-BLOOM · Different, but Fashion</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      /* FULL IMAGE VISIBLE - not zoomed in */
      background-image: url('images/picture5.png');
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-color: #fff5f0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* soft pink and gold gradient overlay - keeps the theme */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(255, 200, 180, 0.12) 0%, rgba(255, 180, 150, 0.06) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* floating emojis decorations - pink and gold theme */
    .floating-emoji {
      position: absolute;
      pointer-events: none;
      z-index: 5;
      font-size: 1.6rem;
      filter: drop-shadow(0 4px 8px rgba(255, 160, 120, 0.3));
      animation: floatEmoji 6s infinite ease-in-out;
    }

    @keyframes floatEmoji {
      0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.7; }
      50% { transform: translateY(-18px) rotate(8deg); opacity: 1; }
    }

    @keyframes twinkleEmoji {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.9; transform: scale(1.1); }
    }

    .emoji-1 { top: 5%; left: 3%; animation-duration: 5s; }
    .emoji-2 { top: 12%; right: 5%; animation-duration: 7s; animation-delay: 0.5s; }
    .emoji-3 { bottom: 15%; left: 4%; animation-duration: 6s; animation-delay: 1s; }
    .emoji-4 { bottom: 20%; right: 6%; animation-duration: 5.5s; animation-delay: 0.3s; }
    .emoji-5 { top: 30%; left: 2%; animation-duration: 8s; }
    .emoji-6 { top: 55%; right: 3%; animation-duration: 4.5s; }
    .emoji-7 { bottom: 40%; left: 7%; animation-duration: 6.5s; }
    .emoji-8 { top: 70%; right: 8%; animation-duration: 5.8s; }
    .emoji-9 { top: 20%; left: 10%; animation: twinkleEmoji 3s infinite; font-size: 1.2rem; }
    .emoji-10 { bottom: 30%; right: 10%; animation: twinkleEmoji 3.5s infinite; font-size: 1.2rem; }

    /* main content container - pushed LOWER on the page */
    .content-container {
      max-width: 460px;
      width: 100%;
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: 32vh;
    }

    /* SMALLER QUOTE BOX - LIGHT PINK BACKGROUND */
    .quote-box {
      background: #ffe4e8;
      backdrop-filter: blur(8px);
      border-radius: 35px;
      padding: 0.9rem 1.3rem;
      box-shadow: 0 12px 25px -10px rgba(0, 0, 0, 0.1), 0 0 0 2px rgba(255, 200, 170, 0.5);
      border: 1px solid rgba(255, 220, 200, 0.8);
      text-align: center;
      width: 100%;
      transition: transform 0.3s ease;
    }

    .quote-box:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 28px -12px rgba(0, 0, 0, 0.15), 0 0 0 2px rgba(255, 190, 150, 0.6);
      background: #ffe0e6;
    }

    .quote-text {
      font-size: 0.95rem;
      line-height: 1.4;
      color: #8b5a6b;
      font-weight: 500;
      font-style: italic;
      font-family: 'Great Vibes', cursive;
      letter-spacing: 0.3px;
    }

    .quote-author {
      margin-top: 0.4rem;
      font-size: 0.8rem;
      color: #e8a87c;
      font-weight: 600;
    }

    .quote-author::before {
      content: "— ";
      color: #ff8eb5;
    }

    .quote-decoration {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }

    .quote-decoration span {
      animation: floatEmoji 3s infinite;
      opacity: 0.7;
    }

    /* navigation buttons - moved lower */
    .nav-buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1.8rem;
    }

    .btn {
      background: linear-gradient(95deg, #ffb347, #ff8c5a);
      padding: 6px 20px;
      border-radius: 40px;
      text-decoration: none;
      color: #3e2a2a;
      font-weight: 600;
      transition: 0.25s;
      box-shadow: 0 4px 12px rgba(255, 140, 70, 0.25);
      font-family: 'Poppins', sans-serif;
      font-size: 0.75rem;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .btn:hover {
      background: linear-gradient(95deg, #ffc05c, #ffa06a);
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(255, 140, 70, 0.35);
    }

    /* responsive */
    @media (max-width: 700px) {
      body { padding: 1rem; }
      .content-container { margin-top: 25vh; max-width: 350px; }
      .quote-text { font-size: 0.8rem; }
      .quote-box { padding: 0.7rem 1rem; border-radius: 30px; }
      .btn { padding: 5px 14px; font-size: 0.65rem; }
      .floating-emoji { font-size: 1.2rem; }
    }

    @media (max-width: 550px) {
      .content-container { margin-top: 20vh; max-width: 280px; }
      .quote-text { font-size: 0.7rem; }
    }
  </style>
</head>
<body>

<!-- floating decorations -->
<div class="floating-emoji emoji-1">🌸</div>
<div class="floating-emoji emoji-2">💗</div>
<div class="floating-emoji emoji-3">🎀</div>
<div class="floating-emoji emoji-4">✨</div>
<div class="floating-emoji emoji-5">💕</div>
<div class="floating-emoji emoji-6">🌟</div>
<div class="floating-emoji emoji-7">🌸</div>
<div class="floating-emoji emoji-8">💖</div>
<div class="floating-emoji emoji-9">⭐</div>
<div class="floating-emoji emoji-10">🎀</div>

<div class="content-container">
  <!-- SMALL LIGHT PINK QUOTE BOX -->
  <div class="quote-box">
    <div class="quote-text">
      “We all dress differently, but we all express something true about ourselves.”
    </div>
    <div class="quote-author">Unknown</div>
    <div class="quote-decoration">
      <span>✨</span>
      <span>🌸</span>
      <span>💗</span>
      <span>🎀</span>
      <span>✨</span>
    </div>
  </div>

  <!-- NAVIGATION BUTTONS -->
  <div class="nav-buttons">
    <a href="welcome-bloom.html" class="btn">◀ Back to Welcome</a>
    <a href="closing-page.html" class="btn">Final Bloom →</a>
  </div>
</div>

</body>
</html>
