<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>THE T-BLOOM · Different, but Fashion</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background-image: url('images/picture5.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* elegant overlay to make text readable */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.1) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* floating emojis decorations */
    .floating-emoji {
      position: absolute;
      pointer-events: none;
      z-index: 5;
      font-size: 2rem;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
      animation: floatEmoji 6s infinite ease-in-out;
    }

    @keyframes floatEmoji {
      0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.8; }
      50% { transform: translateY(-20px) rotate(8deg); opacity: 1; }
    }

    @keyframes twinkleEmoji {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    .emoji-1 { top: 5%; left: 3%; animation-duration: 5s; }
    .emoji-2 { top: 12%; right: 5%; animation-duration: 7s; animation-delay: 0.5s; }
    .emoji-3 { bottom: 15%; left: 4%; animation-duration: 6s; animation-delay: 1s; }
    .emoji-4 { bottom: 20%; right: 6%; animation-duration: 5.5s; animation-delay: 0.3s; }
    .emoji-5 { top: 30%; left: 2%; animation-duration: 8s; }
    .emoji-6 { top: 55%; right: 3%; animation-duration: 4.5s; }
    .emoji-7 { bottom: 40%; left: 7%; animation-duration: 6.5s; }
    .emoji-8 { top: 70%; right: 8%; animation-duration: 5.8s; }
    .emoji-9 { top: 20%; left: 10%; animation: twinkleEmoji 3s infinite; font-size: 1.5rem; }
    .emoji-10 { bottom: 30%; right: 10%; animation: twinkleEmoji 3.5s infinite; font-size: 1.5rem; }

    /* main content container - pushed lower */
    .content-container {
      max-width: 600px;
      width: 100%;
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: 15vh;
    }

    /* SMALLER QUOTE BOX - moved lower */
    .quote-box {
      background: rgba(255, 250, 245, 0.92);
      backdrop-filter: blur(16px);
      border-radius: 50px;
      padding: 1.5rem 2rem;
      box-shadow: 0 20px 35px -15px rgba(0, 0, 0, 0.2), 0 0 0 3px rgba(255, 200, 180, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.7);
      text-align: center;
      width: 100%;
      transition: transform 0.3s ease;
    }

    .quote-box:hover {
      transform: translateY(-3px);
    }

    .quote-text {
      font-size: 1.3rem;
      line-height: 1.5;
      color: #4a2e3c;
      font-weight: 500;
      font-style: italic;
      font-family: 'Great Vibes', cursive;
      letter-spacing: 0.5px;
    }

    .quote-author {
      margin-top: 0.7rem;
      font-size: 0.95rem;
      color: #e8a87c;
      font-weight: 600;
    }

    .quote-author::before {
      content: "— ";
      color: #ff8eb5;
    }

    .quote-decoration {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 0.8rem;
      font-size: 1rem;
    }

    .quote-decoration span {
      animation: floatEmoji 3s infinite;
      opacity: 0.8;
    }

    /* navigation buttons - moved lower */
    .nav-buttons {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      flex-wrap: wrap;
      margin-top: 2rem;
    }

    .btn {
      background: linear-gradient(95deg, #ffb347, #ff8c5a);
      padding: 8px 24px;
      border-radius: 50px;
      text-decoration: none;
      color: #3e2a2a;
      font-weight: 600;
      transition: 0.25s;
      box-shadow: 0 6px 14px rgba(255, 140, 70, 0.3);
      font-family: 'Poppins', sans-serif;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover {
      background: linear-gradient(95deg, #ffc05c, #ffa06a);
      transform: translateY(-2px);
      box-shadow: 0 10px 18px rgba(255, 140, 70, 0.4);
    }

    /* responsive */
    @media (max-width: 700px) {
      body { padding: 1rem; }
      .content-container { margin-top: 10vh; }
      .quote-text { font-size: 1rem; }
      .quote-box { padding: 1rem 1.5rem; border-radius: 40px; }
      .btn { padding: 6px 18px; font-size: 0.75rem; }
      .floating-emoji { font-size: 1.3rem; }
    }

    @media (max-width: 480px) {
      .quote-text { font-size: 0.85rem; }
      .quote-box { padding: 0.8rem 1.2rem; }
    }
  </style>
</head>
<body>

<!-- floating decorations -->
<div class="floating-emoji emoji-1">🌸</div>
<div class="floating-emoji emoji-2">💗</div>
<div class="floating-emoji emoji-3">🎀</div>
<div class="floating-emoji emoji-4">✨</div>
<div class="floating-emoji emoji-5">💕</div>
<div class="floating-emoji emoji-6">🌟</div>
<div class="floating-emoji emoji-7">🌸</div>
<div class="floating-emoji emoji-8">💖</div>
<div class="floating-emoji emoji-9">⭐</div>
<div class="floating-emoji emoji-10">🎀</div>

<div class="content-container">
  <!-- SMALLER QUOTE BOX - NO TITLE BOX ABOVE IT -->
  <div class="quote-box">
    <div class="quote-text">
      “We all dress differently, but we all express something true about ourselves.”
    </div>
    <div class="quote-author">Unknown</div>
    <div class="quote-decoration">
      <span>✨</span>
      <span>🌸</span>
      <span>💗</span>
      <span>🎀</span>
      <span>✨</span>
    </div>
  </div>

  <!-- NAVIGATION BUTTONS -->
  <div class="nav-buttons">
    <a href="welcome-bloom.html" class="btn">◀ Back to Welcome</a>
    <a href="closing-page.html" class="btn">Final Bloom →</a>
  </div>
</div>

</body>
</html>
