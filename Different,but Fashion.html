<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>THE T-BLOOM · Different, but Fashion</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background-image: url('images/picture5.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* elegant overlay to make text readable */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.1) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* floating emojis decorations */
    .floating-emoji {
      position: absolute;
      pointer-events: none;
      z-index: 5;
      font-size: 2rem;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
      animation: floatEmoji 6s infinite ease-in-out;
    }

    @keyframes floatEmoji {
      0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.8; }
      50% { transform: translateY(-20px) rotate(8deg); opacity: 1; }
    }

    @keyframes twinkleEmoji {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    .emoji-1 { top: 5%; left: 3%; animation-duration: 5s; }
    .emoji-2 { top: 12%; right: 5%; animation-duration: 7s; animation-delay: 0.5s; }
    .emoji-3 { bottom: 15%; left: 4%; animation-duration: 6s; animation-delay: 1s; }
    .emoji-4 { bottom: 20%; right: 6%; animation-duration: 5.5s; animation-delay: 0.3s; }
    .emoji-5 { top: 30%; left: 2%; animation-duration: 8s; }
    .emoji-6 { top: 55%; right: 3%; animation-duration: 4.5s; }
    .emoji-7 { bottom: 40%; left: 7%; animation-duration: 6.5s; }
    .emoji-8 { top: 70%; right: 8%; animation-duration: 5.8s; }
    .emoji-9 { top: 20%; left: 10%; animation: twinkleEmoji 3s infinite; font-size: 1.5rem; }
    .emoji-10 { bottom: 30%; right: 10%; animation: twinkleEmoji 3.5s infinite; font-size: 1.5rem; }

    /* main content container */
    .content-container {
      max-width: 850px;
      width: 100%;
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }

    /* title section */
    .title-section {
      text-align: center;
      background: rgba(255, 251, 248, 0.88);
      backdrop-filter: blur(12px);
      border-radius: 70px;
      padding: 1.8rem 2.5rem;
      box-shadow: 0 30px 45px -20px rgba(0, 0, 0, 0.2), 0 0 0 2px rgba(255, 200, 180, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.6);
      width: 100%;
    }

    .title-main {
      font-family: 'Great Vibes', cursive;
      font-size: 3.8rem;
      background: linear-gradient(125deg, #ff4fa3, #ff8eb5, #e8a87c, #ffb347);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: 2px;
      animation: gentleGlow 3s infinite alternate;
    }

    @keyframes gentleGlow {
      0%, 100% { filter: drop-shadow(0 0 2px rgba(255, 200, 150, 0.3)); }
      50% { filter: drop-shadow(0 0 15px rgba(255, 180, 120, 0.5)); }
    }

    .title-decoration {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 0.5rem;
      font-size: 1.5rem;
    }

    .title-decoration span {
      animation: floatEmoji 3s infinite;
      display: inline-block;
    }

    /* quote box */
    .quote-box {
      background: rgba(255, 250, 245, 0.92);
      backdrop-filter: blur(16px);
      border-radius: 60px;
      padding: 2.5rem 2.8rem;
      box-shadow: 0 25px 40px -18px rgba(0, 0, 0, 0.25), 0 0 0 3px rgba(255, 200, 180, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.7);
      text-align: center;
      width: 100%;
      transition: transform 0.3s ease;
    }

    .quote-box:hover {
      transform: translateY(-5px);
    }

    .quote-text {
      font-size: 1.6rem;
      line-height: 1.6;
      color: #4a2e3c;
      font-weight: 500;
      font-style: italic;
      font-family: 'Great Vibes', cursive;
      letter-spacing: 1px;
    }

    .quote-author {
      margin-top: 1rem;
      font-size: 1.1rem;
      color: #e8a87c;
      font-weight: 600;
    }

    .quote-author::before {
      content: "— ";
      color: #ff8eb5;
    }

    .quote-decoration {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-top: 1.2rem;
      font-size: 1.3rem;
    }

    .quote-decoration span {
      animation: floatEmoji 3s infinite;
      opacity: 0.8;
    }

    /* inspiration line */
    .inspiration-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(255, 251, 248, 0.75);
      backdrop-filter: blur(8px);
      border-radius: 50px;
      padding: 0.6rem 1.5rem;
      font-size: 0.9rem;
      color: #c47a96;
      font-weight: 500;
    }

    .inspiration-line span {
      animation: floatEmoji 2s infinite;
    }

    /* navigation buttons */
    .nav-buttons {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    .btn {
      background: linear-gradient(95deg, #ffb347, #ff8c5a);
      padding: 10px 28px;
      border-radius: 60px;
      text-decoration: none;
      color: #3e2a2a;
      font-weight: 700;
      transition: 0.25s;
      box-shadow: 0 6px 14px rgba(255, 140, 70, 0.3);
      font-family: 'Poppins', sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn:hover {
      background: linear-gradient(95deg, #ffc05c, #ffa06a);
      transform: translateY(-3px);
      box-shadow: 0 12px 22px rgba(255, 140, 70, 0.45);
    }

    /* responsive */
    @media (max-width: 700px) {
      body { padding: 1rem; }
      .title-main { font-size: 2.5rem; }
      .quote-text { font-size: 1.2rem; }
      .title-section { padding: 1.2rem; }
      .quote-box { padding: 1.5rem; }
      .btn { padding: 8px 20px; font-size: 0.8rem; }
      .floating-emoji { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<!-- floating decorations -->
<div class="floating-emoji emoji-1">🌸</div>
<div class="floating-emoji emoji-2">💗</div>
<div class="floating-emoji emoji-3">🎀</div>
<div class="floating-emoji emoji-4">✨</div>
<div class="floating-emoji emoji-5">💕</div>
<div class="floating-emoji emoji-6">🌟</div>
<div class="floating-emoji emoji-7">🌸</div>
<div class="floating-emoji emoji-8">💖</div>
<div class="floating-emoji emoji-9">⭐</div>
<div class="floating-emoji emoji-10">🎀</div>

<div class="content-container">
  <!-- TITLE SECTION -->
  <div class="title-section">
    <h1 class="title-main">Different, but Fashion ✨</h1>
    <div class="title-decoration">
      <span>🌸</span>
      <span>💗</span>
      <span>🎀</span>
      <span>✨</span>
      <span>💕</span>
    </div>
  </div>

  <!-- QUOTE BOX -->
  <div class="quote-box">
    <div class="quote-text">
      “We all dress differently, but we all express something true about ourselves.”
    </div>
    <div class="quote-author">Unknown</div>
    <div class="quote-decoration">
      <span>✨</span>
      <span>🌸</span>
      <span>💗</span>
      <span>🎀</span>
      <span>✨</span>
    </div>
  </div>

  <!-- INSPIRATION LINE -->
  <div class="inspiration-line">
    <span>🌸</span> every style tells a story <span>💗</span> every look blooms <span>🎀</span>
  </div>

  <!-- NAVIGATION BUTTONS -->
  <div class="nav-buttons">
    <a href="welcome-bloom.html" class="btn">◀ Back to Welcome</a>
    <a href="closing-page.html" class="btn">Final Bloom →</a>
  </div>
</div>

</body>
</html>
