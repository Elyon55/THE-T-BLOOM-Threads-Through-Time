<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>THE T-BLOOM · Two Worlds of Style</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background-image: url('images/picture6.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 2rem;
    }

    /* floating emojis */
    .floating-emoji {
      position: absolute;
      pointer-events: none;
      z-index: 5;
      font-size: 1.8rem;
      animation: floatEmoji 6s infinite ease-in-out;
    }

    @keyframes floatEmoji {
      0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.7; }
      50% { transform: translateY(-20px) rotate(8deg); opacity: 1; }
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    .e1 { top: 5%; left: 3%; animation-duration: 5s; }
    .e2 { top: 12%; right: 5%; animation-duration: 7s; animation-delay: 0.5s; }
    .e3 { bottom: 15%; left: 4%; animation-duration: 6s; animation-delay: 1s; }
    .e4 { bottom: 20%; right: 6%; animation-duration: 5.5s; animation-delay: 0.3s; }
    .e5 { top: 30%; left: 2%; animation-duration: 8s; }
    .e6 { top: 55%; right: 3%; animation-duration: 4.5s; }
    .e7 { bottom: 40%; left: 7%; animation-duration: 6.5s; }
    .e8 { top: 70%; right: 8%; animation-duration: 5.8s; }
    .e9 { top: 20%; left: 10%; animation: twinkle 3s infinite; font-size: 1.3rem; }
    .e10 { bottom: 30%; right: 10%; animation: twinkle 3.5s infinite; font-size: 1.3rem; }

    /* content at bottom - pushed LOWER with more margin */
    .bottom-content {
      max-width: 380px;
      width: 100%;
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 3vh;
    }

    /* quote box - SMALLER and LOWER */
    .quote-box {
      background: rgba(255, 224, 232, 0.92);
      backdrop-filter: blur(8px);
      border-radius: 30px;
      padding: 0.6rem 1.2rem;
      box-shadow: 0 8px 20px -8px rgba(0,0,0,0.1), 0 0 0 2px #ffd4a0, 0 0 0 5px rgba(255,200,150,0.2);
      text-align: center;
      width: 100%;
      border: 1px solid rgba(255,200,150,0.8);
    }

    .quote-text {
      font-size: 0.75rem;
      line-height: 1.4;
      color: #6b3a4a;
      font-weight: 500;
      font-style: italic;
      font-family: 'Playfair Display', serif;
    }

    .quote-author {
      margin-top: 0.3rem;
      font-size: 0.65rem;
      color: #d49678;
      font-weight: 600;
    }

    .quote-author::before {
      content: "— ";
      color: #e8a87c;
    }

    .quote-deco {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 0.4rem;
      font-size: 0.7rem;
    }

    .quote-deco span {
      animation: floatEmoji 3s infinite;
    }

    /* buttons - smaller to match */
    .buttons {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      margin-top: 0.8rem;
    }

    .btn {
      background: linear-gradient(95deg, #ffb347, #ff9a6a);
      padding: 5px 16px;
      border-radius: 35px;
      text-decoration: none;
      color: #4a2a2a;
      font-weight: 600;
      font-size: 0.65rem;
      font-family: 'Poppins', sans-serif;
      box-shadow: 0 4px 12px rgba(255,140,70,0.25);
      transition: 0.25s;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: linear-gradient(95deg, #ffc05c, #ffaa7a);
    }

    @media (max-width: 700px) {
      body { padding: 1rem; }
      .bottom-content { margin-bottom: 2vh; max-width: 320px; }
      .quote-text { font-size: 0.7rem; }
      .quote-box { padding: 0.5rem 1rem; border-radius: 25px; }
      .btn { padding: 4px 12px; font-size: 0.6rem; }
      .floating-emoji { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<!-- floating decorations -->
<div class="floating-emoji e1">🌸</div>
<div class="floating-emoji e2">💗</div>
<div class="floating-emoji e3">🎀</div>
<div class="floating-emoji e4">✨</div>
<div class="floating-emoji e5">🌍</div>
<div class="floating-emoji e6">🌟</div>
<div class="floating-emoji e7">💕</div>
<div class="floating-emoji e8">💖</div>
<div class="floating-emoji e9">⭐</div>
<div class="floating-emoji e10">🌍</div>

<div class="bottom-content">
  <!-- QUOTE BOX - SMALLER -->
  <div class="quote-box">
    <div class="quote-text">
      “We all dress differently, but we all express something true about ourselves.”
    </div>
    <div class="quote-author">Unknown</div>
    <div class="quote-deco">
      <span>✨</span>
      <span>🌸</span>
      <span>💗</span>
      <span>🎀</span>
      <span>🌍</span>
      <span>✨</span>
    </div>
  </div>

  <!-- BUTTONS -->
  <div class="buttons">
    <a href="Different,but Fashion.html" class="btn">◀ Back</a>
    <a href="finalbloom.html" class="btn">Final Bloom 🌸</a>
  </div>
</div>

</body>
</html>
