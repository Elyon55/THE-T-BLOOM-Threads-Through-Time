<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>THE T-BLOOM · Two Worlds of Style</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background-image: url('images/picture6.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-color: #fff0eb;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* soft pink and gold gradient overlay */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(255, 200, 180, 0.15) 0%, rgba(255, 180, 150, 0.08) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* floating decorations */
    .floating-emoji {
      position: absolute;
      pointer-events: none;
      z-index: 5;
      font-size: 1.8rem;
      filter: drop-shadow(0 4px 8px rgba(255, 160, 120, 0.4));
      animation: floatEmoji 6s infinite ease-in-out;
    }

    @keyframes floatEmoji {
      0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.8; }
      50% { transform: translateY(-20px) rotate(8deg); opacity: 1; }
    }

    @keyframes twinkleEmoji {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    @keyframes spinEmoji {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .emoji-1 { top: 5%; left: 3%; animation-duration: 5s; }
    .emoji-2 { top: 12%; right: 5%; animation-duration: 7s; animation-delay: 0.5s; }
    .emoji-3 { bottom: 15%; left: 4%; animation-duration: 6s; animation-delay: 1s; }
    .emoji-4 { bottom: 20%; right: 6%; animation-duration: 5.5s; animation-delay: 0.3s; }
    .emoji-5 { top: 30%; left: 2%; animation-duration: 8s; }
    .emoji-6 { top: 55%; right: 3%; animation-duration: 4.5s; }
    .emoji-7 { bottom: 40%; left: 7%; animation-duration: 6.5s; }
    .emoji-8 { top: 70%; right: 8%; animation-duration: 5.8s; }
    .emoji-9 { top: 20%; left: 10%; animation: twinkleEmoji 3s infinite; font-size: 1.3rem; }
    .emoji-10 { bottom: 30%; right: 10%; animation: spinEmoji 10s infinite linear; font-size: 1.3rem; }
    .emoji-11 { top: 45%; left: 88%; animation: floatEmoji 4.5s infinite; font-size: 1.4rem; }
    .emoji-12 { bottom: 10%; left: 15%; animation: twinkleEmoji 3.5s infinite; font-size: 1.2rem; }

    /* content container - pushed to bottom */
    .content-container {
      max-width: 480px;
      width: 100%;
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 8vh;
    }

    /* SMALL QUOTE BOX - gold and light pink theme, at the bottom */
    .quote-box {
      background: #ffe0e8;
      backdrop-filter: blur(8px);
      border-radius: 35px;
      padding: 0.9rem 1.5rem;
      box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.1), 0 0 0 2px #ffd4a0, 0 0 0 5px rgba(255, 200, 150, 0.25);
      text-align: center;
      width: 100%;
      transition: transform 0.2s ease;
      border: 1px solid rgba(255, 200, 150, 0.8);
    }

    .quote-box:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 24px -12px rgba(0, 0, 0, 0.15), 0 0 0 2px #ffc896, 0 0 0 7px rgba(255, 200, 150, 0.2);
    }

    .quote-text {
      font-size: 0.9rem;
      line-height: 1.5;
      color: #8b5a6b;
      font-weight: 500;
      font-style: italic;
      font-family: 'Playfair Display', serif;
      letter-spacing: 0.3px;
    }

    .quote-author {
      margin-top: 0.4rem;
      font-size: 0.75rem;
      color: #d49678;
      font-weight: 600;
    }

    .quote-author::before {
      content: "— ";
      color: #e8a87c;
    }

    .quote-decoration {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 0.6rem;
      font-size: 0.9rem;
    }

    .quote-decoration span {
      animation: floatEmoji 3s infinite;
      opacity: 0.7;
    }

    /* navigation buttons */
    .nav-buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .btn {
      background: linear-gradient(95deg, #ffb347, #ff9a6a);
      padding: 6px 20px;
      border-radius: 40px;
      text-decoration: none;
      color: #4a2a2a;
      font-weight: 600;
      transition: 0.25s;
      box-shadow: 0 4px 12px rgba(255, 140, 70, 0.25);
      font-family: 'Poppins', sans-serif;
      font-size: 0.75rem;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .btn:hover {
      background: linear-gradient(95deg, #ffc05c, #ffaa7a);
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(255, 140, 70, 0.35);
    }

    @media (max-width: 700px) {
      body { padding: 1rem; }
      .content-container { margin-bottom: 6vh; max-width: 380px; }
      .quote-text { font-size: 0.8rem; }
      .quote-box { padding: 0.7rem 1.2rem; border-radius: 30px; }
      .btn { padding: 5px 16px; font-size: 0.7rem; }
      .floating-emoji { font-size: 1.2rem; }
    }

    @media (max-width: 480px) {
      .content-container { margin-bottom: 4vh; max-width: 320px; }
      .quote-text { font-size: 0.7rem; }
      .quote-author { font-size: 0.65rem; }
    }
  </style>
</head>
<body>

<!-- floating decorations -->
<div class="floating-emoji emoji-1">🌍</div>
<div class="floating-emoji emoji-2">✨</div>
<div class="floating-emoji emoji-3">💗</div>
<div class="floating-emoji emoji-4">🎀</div>
<div class="floating-emoji emoji-5">🌸</div>
<div class="floating-emoji emoji-6">🌟</div>
<div class="floating-emoji emoji-7">💕</div>
<div class="floating-emoji emoji-8">💖</div>
<div class="floating-emoji emoji-9">⭐</div>
<div class="floating-emoji emoji-10">🌍</div>
<div class="floating-emoji emoji-11">✨</div>
<div class="floating-emoji emoji-12">🌸</div>

<div class="content-container">
  <!-- SMALL QUOTE BOX AT THE BOTTOM - gold and light pink theme -->
  <div class="quote-box">
    <div class="quote-text">
      “We all dress differently, but we all express something true about ourselves.”
    </div>
    <div class="quote-author">Unknown</div>
    <div class="quote-decoration">
      <span>✨</span>
      <span>🌸</span>
      <span>💗</span>
      <span>🎀</span>
      <span>🌍</span>
      <span>✨</span>
    </div>
  </div>

  <!-- NAVIGATION BUTTONS -->
  <div class="nav-buttons">
    <a href="Different,but Fashion.html" class="btn">◀ Back to Fashion</a>
    <a href="finalbloom.html" class="btn">Final Bloom 🌸</a>
  </div>
</div>

</body>
</html>
